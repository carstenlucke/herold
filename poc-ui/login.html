<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herold — Login</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-card {
      width: 100%;
      max-width: 380px;
      padding: var(--sp-8);
      background: var(--c-surface-1);
      border-radius: var(--radius-xl);
    }

    .login-step { display: none; }
    .login-step.active { display: block; }

    .variant-bar {
      display: flex;
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
      padding: var(--sp-2);
      background: var(--c-surface-1);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      flex-wrap: wrap;
    }
    .variant-btn {
      padding: var(--sp-1) var(--sp-3);
      font-family: var(--font-label);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--c-text-dim);
      background: none;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .variant-btn.active {
      color: var(--c-primary);
      border-color: rgba(var(--c-primary-rgb), 0.5);
      background: rgba(var(--c-primary-rgb), 0.06);
    }
    .variant-label {
      font-family: var(--font-label);
      font-size: 0.6rem;
      color: var(--c-text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: var(--sp-2);
    }
  </style>
</head>
<body>
  <div class="layout-fullscreen">
    <div style="width: 100%; max-width: 380px;">

      <!-- Variant selector (poc-only) -->
      <div class="variant-label">Mockup Variant (POC only)</div>
      <div class="variant-bar">
        <button class="variant-btn active" data-step="key">Key</button>
        <button class="variant-btn" data-step="totp">TOTP</button>
        <button class="variant-btn" data-step="totp_setup">TOTP Setup</button>
      </div>

      <div class="login-card neon-border-primary">

        <!-- Brand header -->
        <div class="text-center mb-8">
          <img src="../icons/herold-icon-l-256.png" alt="Herold" style="height: 48px; width: auto; margin: 0 auto var(--sp-4); display: block;">
          <div class="brand-text text-h4 mb-1">Herold</div>
          <div class="brand-subtitle">VOICE DISPATCH SYSTEM</div>
        </div>

        <!-- Step dots -->
        <div class="step-dots mb-6">
          <div class="step-dot active" id="dot1"></div>
          <div class="step-dot" id="dot2"></div>
        </div>

        <!-- Step 1: API Key -->
        <div class="login-step active" id="step-key">
          <div class="field with-icon focused">
            <span class="field-icon mdi mdi-key"></span>
            <span class="field-label">API Key</span>
            <input type="password" placeholder="" autocomplete="current-password">
          </div>

          <button class="btn btn-outlined btn-block btn-lg mt-4">Verify</button>
        </div>

        <!-- Step 2: TOTP -->
        <div class="login-step" id="step-totp">
          <p class="text-body-2 text-center mb-4 text-muted">
            Enter the 6-digit code from your authenticator app.
          </p>

          <div class="field with-icon">
            <span class="field-icon mdi mdi-shield-lock"></span>
            <span class="field-label">TOTP Code</span>
            <input type="text" inputmode="numeric" maxlength="6" placeholder="">
          </div>

          <button class="btn btn-outlined btn-block btn-lg mt-4">Login</button>
          <button class="btn btn-text btn-text-secondary btn-block mt-3 btn-sm">Back</button>
        </div>

        <!-- Step 2b: TOTP Setup -->
        <div class="login-step" id="step-totp_setup">
          <p class="text-body-2 text-center mb-4 text-muted">
            Scan this QR code with your authenticator app, then enter the code below.
          </p>

          <div class="d-flex justify-center mb-4">
            <div style="background: #fff; padding: var(--sp-3); border-radius: var(--radius-md);">
              <!-- Stand-in QR placeholder -->
              <div style="width: 200px; height: 200px; background:
                conic-gradient(from 0deg, #000 0 25%, #fff 25% 50%, #000 50% 75%, #fff 75% 100%);
                background-size: 14px 14px;
                background-repeat: repeat;"></div>
            </div>
          </div>

          <div class="field with-icon">
            <span class="field-icon mdi mdi-shield-check"></span>
            <span class="field-label">Verification Code</span>
            <input type="text" inputmode="numeric" maxlength="6">
          </div>

          <button class="btn btn-outlined btn-block btn-lg mt-4">Verify &amp; Login</button>
          <button class="btn btn-text btn-text-secondary btn-block mt-3 btn-sm">Back</button>
        </div>

      </div>
    </div>
  </div>

  <script>
    const variants = document.querySelectorAll('.variant-btn');
    variants.forEach(btn => {
      btn.addEventListener('click', () => {
        variants.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const target = btn.dataset.step;
        document.querySelectorAll('.login-step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-' + target).classList.add('active');
        // Step dots
        document.getElementById('dot1').classList.toggle('active', target === 'key' || target === 'totp' || target === 'totp_setup');
        document.getElementById('dot2').classList.toggle('active', target === 'totp' || target === 'totp_setup');
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herold — New Recording</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .variant { display: none; }
    .variant.active { display: block; }

    .variant-bar {
      display: flex;
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
      padding: var(--sp-2);
      background: var(--c-surface-1);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      flex-wrap: wrap;
    }
    .variant-btn {
      padding: var(--sp-1) var(--sp-3);
      font-family: var(--font-label);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--c-text-dim);
      background: none;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .variant-btn.active {
      color: var(--c-primary);
      border-color: rgba(var(--c-primary-rgb), 0.5);
      background: rgba(var(--c-primary-rgb), 0.06);
    }
    .variant-label {
      font-family: var(--font-label);
      font-size: 0.6rem;
      color: var(--c-text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: var(--sp-2);
    }

    .extra-fields { display: none; }
    .extra-fields.visible { display: block; }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- Side Navigation (desktop) -->
    <nav class="side-nav">
      <a href="dashboard.html" class="side-nav-brand">
        <img src="../icons/herold-icon-l-256.png" alt="Herold">
        <div>
          <div class="brand-text">Herold</div>
          <div class="brand-subtitle">VOICE DISPATCH SYSTEM</div>
        </div>
      </a>
      <div class="side-nav-divider"></div>
      <div class="side-nav-list">
        <a href="dashboard.html" class="nav-item">
          <span class="mdi mdi-view-dashboard"></span>
          Dashboard
        </a>
        <a href="recording.html" class="nav-item active">
          <span class="mdi mdi-microphone"></span>
          Record
        </a>
        <a href="notes.html" class="nav-item">
          <span class="mdi mdi-format-list-bulleted"></span>
          Notes
        </a>
        <a href="settings.html" class="nav-item">
          <span class="mdi mdi-cog"></span>
          Settings
        </a>
      </div>
      <div class="side-nav-footer">
        <a href="login.html" class="nav-item">
          <span class="mdi mdi-logout"></span>
          Logout
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="app-main">
      <div class="content-container">

        <div class="page-header">
          <h1>New Recording</h1>
          <p>Select a type, record your voice note, then save.</p>
        </div>

        <!-- Variant selector (poc-only) -->
        <div class="variant-label">Mockup Variant (POC only)</div>
        <div class="variant-bar">
          <button class="variant-btn active" onclick="showVariant('idle')">Idle</button>
          <button class="variant-btn" onclick="showVariant('recording')">Recording</button>
          <button class="variant-btn" onclick="showVariant('review')">Review</button>
        </div>

        <!-- Type selector -->
        <div class="mb-6">
          <div class="text-caption font-label text-muted mb-2">Message Type</div>
          <div class="chip-group">
            <button class="chip active" onclick="selectType(this, 'general')">
              <span class="mdi mdi-message-text"></span>
              General
            </button>
            <button class="chip" onclick="selectType(this, 'youtube')">
              <span class="mdi mdi-youtube"></span>
              YouTube Transcription
            </button>
            <button class="chip" onclick="selectType(this, 'diary')">
              <span class="mdi mdi-book-open-variant"></span>
              Diary
            </button>
          </div>
        </div>

        <!-- Extra fields (YouTube) -->
        <div class="extra-fields" id="youtubeFields">
          <div class="field">
            <span class="field-label">YouTube URL</span>
            <input type="url" placeholder="https://www.youtube.com/watch?v=...">
          </div>
        </div>

        <!-- =========================================================
             VARIANT: IDLE — ready to record
             ========================================================= -->
        <div class="variant active" id="v-idle">
          <div class="recorder py-6">
            <div class="waveform-mini idle">
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
            </div>

            <div class="recorder-timer">00:00</div>

            <div class="d-flex align-center ga-4">
              <button class="record-button">
                <span class="mdi mdi-microphone"></span>
              </button>
            </div>
          </div>
        </div>

        <!-- =========================================================
             VARIANT: RECORDING — active capture
             ========================================================= -->
        <div class="variant" id="v-recording">
          <div class="recorder py-6">
            <div class="waveform-mini">
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
              <div class="waveform-mini-bar"></div>
            </div>

            <div class="recorder-timer">00:23</div>

            <div class="d-flex align-center ga-4">
              <button class="btn btn-tonal-secondary btn-icon">
                <span class="mdi mdi-pause"></span>
              </button>
              <button class="record-button recording">
                <span class="mdi mdi-stop"></span>
              </button>
              <div style="width: 40px;"></div>
            </div>
          </div>
        </div>

        <!-- =========================================================
             VARIANT: REVIEW — playback after recording
             ========================================================= -->
        <div class="variant" id="v-review">
          <div class="recorder py-6">
            <div class="d-flex align-center" style="width: 240px;">
              <div class="playback-bar">
                <div class="playback-bar-fill" style="width: 38%;"></div>
              </div>
            </div>

            <div class="recorder-timer">00:18 / 00:47</div>

            <div class="d-flex align-center ga-4">
              <button class="btn btn-tonal-error btn-icon">
                <span class="mdi mdi-delete"></span>
              </button>
              <button class="record-button">
                <span class="mdi mdi-play"></span>
              </button>
              <div style="width: 40px;"></div>
            </div>
          </div>

          <!-- Save -->
          <button class="btn btn-outlined btn-block btn-lg mt-4">
            <span class="mdi mdi-content-save"></span>
            Save Voice Note
          </button>
        </div>

      </div>
    </main>

    <!-- Bottom Navigation (mobile) -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="mdi mdi-view-dashboard"></span>
        Dashboard
      </a>
      <a href="recording.html" class="nav-item nav-record active">
        <span class="mdi mdi-microphone"></span>
        Record
      </a>
      <a href="notes.html" class="nav-item">
        <span class="mdi mdi-format-list-bulleted"></span>
        Notes
      </a>
      <a href="settings.html" class="nav-item">
        <span class="mdi mdi-cog"></span>
        Settings
      </a>
    </nav>

  </div>

  <script>
    function selectType(el, type) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('youtubeFields').classList.toggle('visible', type === 'youtube');
    }

    function showVariant(name) {
      document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('v-' + name).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>

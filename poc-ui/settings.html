<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herold — Settings</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .settings-row {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }

    .settings-key {
      font-family: var(--font-label);
      font-size: 0.75rem;
      color: var(--c-text-muted);
      min-width: 60px;
    }

    .settings-card-header {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      margin-bottom: var(--sp-3);
    }

    .settings-card-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--c-text);
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- Side Navigation (desktop) -->
    <nav class="side-nav">
      <a href="dashboard.html" class="side-nav-brand">
        <img src="../icons/herold-icon-l-256.png" alt="Herold">
        <div>
          <div class="brand-text">Herold</div>
          <div class="brand-subtitle">VOICE DISPATCH SYSTEM</div>
        </div>
      </a>
      <div class="side-nav-divider"></div>
      <div class="side-nav-list">
        <a href="dashboard.html" class="nav-item">
          <span class="mdi mdi-view-dashboard"></span>
          Dashboard
        </a>
        <a href="recording.html" class="nav-item">
          <span class="mdi mdi-microphone"></span>
          Record
        </a>
        <a href="notes.html" class="nav-item">
          <span class="mdi mdi-format-list-bulleted"></span>
          Notes
        </a>
        <a href="settings.html" class="nav-item active">
          <span class="mdi mdi-cog"></span>
          Settings
        </a>
      </div>
      <div class="side-nav-footer">
        <a href="login.html" class="nav-item">
          <span class="mdi mdi-logout"></span>
          Logout
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="app-main">
      <div class="content-container">

        <div class="page-header">
          <h1>Settings</h1>
          <p>Configuration and account management.</p>
        </div>

        <div class="d-flex flex-column ga-4">

          <!-- GitHub -->
          <div class="card neon-border-primary pa-4">
            <div class="settings-card-header">
              <span class="mdi mdi-github text-secondary" style="font-size: 1.375rem;"></span>
              <span class="settings-card-title">GitHub</span>
            </div>
            <div class="d-flex flex-column ga-2">
              <div class="settings-row">
                <span class="settings-key">Owner:</span>
                <code>ca********e</code>
              </div>
              <div class="settings-row">
                <span class="settings-key">Repo:</span>
                <code>he*******ks</code>
              </div>
            </div>
          </div>

          <!-- Authentication -->
          <div class="card neon-border-primary pa-4">
            <div class="settings-card-header">
              <span class="mdi mdi-shield-lock text-primary" style="font-size: 1.375rem;"></span>
              <span class="settings-card-title">Authentication</span>
            </div>
            <div class="d-flex flex-column ga-2">
              <div class="settings-row">
                <span class="mdi mdi-check-circle text-secondary"></span>
                <span class="text-body-2">TOTP Confirmed</span>
              </div>
              <div class="settings-row">
                <span class="mdi mdi-check-circle text-secondary"></span>
                <span class="text-body-2">API Key Active</span>
              </div>
            </div>
          </div>

          <!-- About -->
          <div class="card neon-border-primary pa-4">
            <div class="settings-card-header">
              <span class="mdi mdi-information text-warning" style="font-size: 1.375rem;"></span>
              <span class="settings-card-title">About</span>
            </div>
            <div class="text-body-2 text-muted">Herold &mdash; Voice Dispatch System</div>
            <div class="text-caption text-muted mt-1">Version 1.0.0</div>
          </div>

          <!-- Logout -->
          <button class="btn btn-tonal-error btn-block btn-lg">
            <span class="mdi mdi-logout"></span>
            Logout
          </button>
        </div>

      </div>
    </main>

    <!-- Bottom Navigation (mobile) -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="mdi mdi-view-dashboard"></span>
        Dashboard
      </a>
      <a href="recording.html" class="nav-item nav-record">
        <span class="mdi mdi-microphone"></span>
        Record
      </a>
      <a href="notes.html" class="nav-item">
        <span class="mdi mdi-format-list-bulleted"></span>
        Notes
      </a>
      <a href="settings.html" class="nav-item active">
        <span class="mdi mdi-cog"></span>
        Settings
      </a>
    </nav>

  </div>
</body>
</html>
